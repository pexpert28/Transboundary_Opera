# ================================================================
# config.yaml — Transboundary Opera Pipeline Configuration
# ================================================================
# Fill in all values marked TODO before running the pipeline.
# ================================================================

# ── CSC / Mahti settings ────────────────────────────────────────
csc_project: "project_XXXXXXX"       # TODO: your CSC project number
allas_bucket: "opera-pipeline"        # TODO: your Allas bucket name

# Path to the repo on Mahti (after cloning)
repo_path: "/scratch/project_XXXXXXX/YOUR_USERNAME/transboundary_opera"

# Path to shapefile on Mahti (after a-get from Allas)
shapefile: "/scratch/project_XXXXXXX/YOUR_USERNAME/transboundary_opera/TBA_full.shp"

# ── Container ───────────────────────────────────────────────────
# Key in Allas where the .sif file lives
container_object: "container/transboundary_opera.sif"

# ── OPERA product settings ──────────────────────────────────────
opera_version: 1.1
start_date: "20200101"
end_date: "20221231"

# ── Processing resources ────────────────────────────────────────
n_workers: 16          # must match --cpus-per-task in SLURM frame job
chunk_size: 50         # run2 chunk size — lower = safer memory usage
download_workers: 5    # parallel S3 download workers in run1

# ── SLURM resources ─────────────────────────────────────────────
slurm:
  frame_job:
    partition: "medium"
    cpus: 16
    mem: "128G"
    time: "08:00:00"
    nvme_gb: 500        # local NVMe scratch size in GB

  decompose_job:
    partition: "medium"
    cpus: 8
    mem: "64G"
    time: "02:00:00"
    nvme_gb: 200

  cog_job:
    partition: "medium"
    cpus: 4
    mem: "32G"
    time: "01:00:00"
    nvme_gb: 100

# ── Reference point lookup (lat lon per aquifer) ────────────────
