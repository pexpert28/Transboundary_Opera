# ================================================================
# config.yaml — Transboundary Opera Pipeline Configuration
# ================================================================
# Fill in all values marked TODO before running the pipeline.
# ================================================================

# ── CSC / Mahti settings ────────────────────────────────────────
csc_project: "project_2019354"       # TODO: your CSC project number
allas_bucket: "transboundry-opera-bucket"       

# Path to the repo on Mahti (after cloning)
repo_path: "/scratch/project_2019354/pmahmood/Transboundary_Opera"

# Path to shapefile on Mahti (after a-get from Allas)
shapefile: "/scratch/project_2019354/pmahmood/Transboundary_Opera/raw_data/TBA_full.shp"

# ── Container ───────────────────────────────────────────────────
# Key in Allas where the .sif file lives
container_object: "container/transboundary_opera.sif"



# ── OPERA product settings ──────────────────────────────────────
opera_version: 1.1
start_date: "20200101"
end_date: "20231231"

# ── Download ────────────────────────────────────────────────────
download_workers: 5     # parallel S3 download workers

# ── SLURM resources ─────────────────────────────────────────────
slurm:
  frame_job:
    partition: "small"
    cpus: 8
    mem: "120G"
    time: "48:00:00"
    nvme_gb: 800        # ~10.5y of .nc files per frame

  decompose_job:
    partition: "small"
    cpus: 8
    mem: "240G"
    time: "24:00:00"
    nvme_gb: 600        # pulls every frame's timeseries.h5 (~10GB each at full range)

  cog_job:
    partition: "small"
    cpus: 4
    mem: "64G"
    time: "06:00:00"
    nvme_gb: 400